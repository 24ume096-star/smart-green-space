name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: timescale/timescaledb:latest-pg15
        env:
          POSTGRES_USER: sgs
          POSTGRES_PASSWORD: sgs_password
          POSTGRES_DB: greenspace
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U sgs -d greenspace"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    defaults:
      run:
        working-directory: smart-green-space-api

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: smart-green-space-api/package-lock.json

      - name: Install
        run: npm ci

      - name: Prisma migrate
        env:
          NODE_ENV: test
          CORS_ORIGIN: http://localhost:5173
          DATABASE_URL: postgresql://sgs:sgs_password@localhost:5432/greenspace?schema=public
          REDIS_URL: redis://localhost:6379
          JWT_ACCESS_SECRET: test_access_secret_1234567890
          JWT_REFRESH_SECRET: test_refresh_secret_1234567890
        run: npx prisma migrate deploy

      - name: Test
        env:
          NODE_ENV: test
          CORS_ORIGIN: http://localhost:5173
          DATABASE_URL: postgresql://sgs:sgs_password@localhost:5432/greenspace?schema=public
          REDIS_URL: redis://localhost:6379
          JWT_ACCESS_SECRET: test_access_secret_1234567890
          JWT_REFRESH_SECRET: test_refresh_secret_1234567890
        run: npm run test:coverage

  build:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: smart-green-space-api
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build --target prod -t smart-green-space-api:${{ github.sha }} .

