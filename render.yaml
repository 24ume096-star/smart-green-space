services:
  # 1. Node.js Backend API
  - type: web
    name: sgs-api
    plan: free
    runtime: docker
    dockerContext: smart-green-space-api
    dockerfilePath: smart-green-space-api/Dockerfile
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        fromDatabase:
          name: sgs-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: sgs-cache
          property: connectionString
      - key: CORS_ORIGIN
        value: "*"
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true

  # 2. Python ML Microservice
  - type: web
    name: sgs-ml
    plan: free
    runtime: docker
    dockerContext: smart-green-space-platform/apps/ml-service
    dockerfilePath: smart-green-space-platform/apps/ml-service/Dockerfile
    envVars:
      - key: PORT
        value: 8001

  # 3. Redis (Managed Key-Value)
  - type: keyvalue
    name: sgs-cache
    plan: free # Note: Render Free tier Redis is available
    ipAllowList: [] 

# 4. Managed Databases
databases:
  - name: sgs-db
    plan: free
    databaseName: greenspace
    user: sgs_user
